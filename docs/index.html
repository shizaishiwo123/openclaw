<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>致温嘉璇 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0010; overflow-x: hidden; font-family: 'Georgia', serif; min-height: 100vh; cursor: none; }
    .cursor { position: fixed; width: 20px; height: 20px; background: radial-gradient(circle, #ff6b9d, #ff0055); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); box-shadow: 0 0 10px #ff6b9d, 0 0 20px #ff0055; }
    #stars-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    #heart-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .container { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 60px 20px; }
    .subtitle { font-size: 1rem; color: #ff9cc2; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 16px; animation: pulse-glow 2s infinite; }
    .main-title { font-size: clamp(2.5rem, 8vw, 5rem); background: linear-gradient(135deg, #ff6b9d, #ff0055, #ffd700, #ff6b9d); background-size: 300%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: gradientShift 4s linear infinite, fadeInDown 1.5s ease forwards; line-height: 1.2; }
    .title-section { text-align: center; margin-bottom: 50px; animation: fadeInDown 1.5s ease forwards; }
    .big-heart { font-size: clamp(80px, 15vw, 140px); animation: heartbeat 1.5s ease-in-out infinite; filter: drop-shadow(0 0 20px #ff0055) drop-shadow(0 0 40px #ff6b9d); cursor: pointer; user-select: none; margin: 20px 0; }
    .letter-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,107,157,0.4); border-radius: 20px; padding: 40px 50px; max-width: 680px; width: 100%; backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(255,0,85,0.2), inset 0 0 40px rgba(255,107,157,0.05); animation: fadeInUp 2s ease forwards; text-align: center; }
    .letter-card p { color: #ffd0e8; font-size: 1.15rem; line-height: 2; margin-bottom: 16px; }
    .letter-card .highlight { color: #ff9cc2; font-size: 1.3rem; font-style: italic; }
    .name-tag { font-size: clamp(1.8rem, 5vw, 2.8rem); background: linear-gradient(135deg, #ffd700, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: bold; letter-spacing: 8px; margin: 10px 0 20px; animation: pulse-glow 2s infinite; }
    .btn-section { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 40px; }
    .btn { padding: 14px 36px; border: none; border-radius: 50px; font-size: 1rem; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; font-family: inherit; }
    .btn-primary { background: linear-gradient(135deg, #ff0055, #ff6b9d); color: white; box-shadow: 0 0 20px rgba(255,0,85,0.5); }
    .btn-primary:hover { transform: scale(1.08); box-shadow: 0 0 40px rgba(255,0,85,0.8); }
    .btn-secondary { background: transparent; color: #ff9cc2; border: 1px solid #ff6b9d; transition: all 0.3s; }
    .btn-secondary:hover { background: rgba(255,107,157,0.2); }
    .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
    .modal.show { display: flex; }
    .modal-box { background: linear-gradient(135deg, #1a0020, #2d0035); border: 1px solid #ff6b9d; border-radius: 24px; padding: 50px 40px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 0 60px rgba(255,0,85,0.4); animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
    .modal-box h2 { font-size: 2rem; background: linear-gradient(135deg, #ffd700, #ff6b9d); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; }
    .modal-box p { color: #ffd0e8; font-size: 1.1rem; line-height: 1.8; margin-bottom: 24px; }
    .modal-emoji { font-size: 3rem; margin-bottom: 16px; }
    .petal { position: fixed; pointer-events: none; z-index: 5; font-size: 1.4rem; animation: fall linear forwards; }
    .footer { margin-top: 60px; color: rgba(255,107,157,0.4); font-size: 0.85rem; letter-spacing: 3px; }
    @keyframes heartbeat { 0%,100%{transform:scale(1)} 14%{transform:scale(1.15)} 28%{transform:scale(1)} 42%{transform:scale(1.1)} 70%{transform:scale(1)} }
    @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    @keyframes pulse-glow { 0%,100%{opacity:1} 50%{opacity:0.7} }
    @keyframes fadeInDown { from{opacity:0;transform:translateY(-40px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
    @keyframes popIn { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
    @keyframes fall { 0%{opacity:1;transform:translateY(-20px) rotate(0deg)} 100%{opacity:0;transform:translateY(100vh) rotate(720deg)} }
    @keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-100px) scale(0.4)} }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<canvas id="stars-canvas"></canvas>
<canvas id="heart-canvas"></canvas>
<div class="container">
  <div class="title-section">
    <div class="subtitle">✨ 一封来自心底的信 ✨</div>
    <div class="main-title">致我最爱的人</div>
  </div>
  <div class="big-heart" id="bigHeart" onclick="heartClick()">💗</div>
  <div class="letter-card">
    <div class="name-tag">温 嘉 璇</div>
    <p class="highlight">「遇见你，是我此生最美好的事」</p>
    <p>在无数个平凡的日子里，你的笑容像阳光一样照进我的世界，让所有的灰色都变得明亮起来。</p>
    <p>你知道吗？每一次想起你，我的心跳都会加速那么一拍，那是我无法掩藏的喜欢。</p>
    <p>我想牵着你的手，走过所有的春夏秋冬，把最好的时光都留给你。</p>
    <p class="highlight">「温嘉璇，我喜欢你。」</p>
    <div class="btn-section">
      <button class="btn btn-primary" onclick="showYes()">💕 我也喜欢你</button>
      <button class="btn btn-secondary" id="noBtn" onclick="moveNoBtn()">再想想...</button>
    </div>
  </div>
  <div class="footer">— 写给温嘉璇，此刻此生 —</div>
</div>
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-emoji">🎉💕🌹</div>
    <h2>太好啦！</h2>
    <p>我的心都要飞起来了！<br>从今以后，让我来守护你的每一天。<br>温嘉璇，你是我最幸运的遇见 💗</p>
    <button class="btn btn-primary" onclick="closeModal()">💕 开始我们的故事</button>
  </div>
</div>
<script>
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; });

// 星空
const sc = document.getElementById('stars-canvas'), sx = sc.getContext('2d');
let stars = [];
function resizeS(){ sc.width=innerWidth; sc.height=innerHeight; stars=Array.from({length:200},()=>({x:Math.random()*sc.width,y:Math.random()*sc.height,r:Math.random()*1.5+0.3,a:Math.random(),s:Math.random()*0.5+0.2})); }
function drawS(){ sx.clearRect(0,0,sc.width,sc.height); stars.forEach(s=>{ s.a+=s.s*0.02; if(s.a>1||s.a<0)s.s*=-1; sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2); sx.fillStyle=`rgba(255,200,220,${Math.abs(s.a)})`; sx.fill(); }); requestAnimationFrame(drawS); }
resizeS(); drawS();

// 粒子爱心
const hc = document.getElementById('heart-canvas'), hx = hc.getContext('2d');
function resizeH(){ hc.width=innerWidth; hc.height=innerHeight; }
class P {
  constructor(){ this.reset(); }
  reset(){ const t=Math.random()*Math.PI*2,sc2=12+Math.random()*4,cx=innerWidth/2,cy=innerHeight/2-60; this.x=cx+sc2*16*Math.pow(Math.sin(t),3); this.y=cy-sc2*(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)); this.vx=(Math.random()-.5)*2; this.vy=(Math.random()-.5)*2-1; this.a=Math.random()*.8+.2; this.r=Math.random()*3+1; this.life=Math.random()*120+60; this.age=0; this.color=`hsl(${Math.random()*40+330},100%,70%)`; }
  update(){ this.x+=this.vx*.3; this.y+=this.vy*.3; this.age++; this.a=(1-this.age/this.life)*.8; if(this.age>this.life)this.reset(); }
  draw(){ hx.beginPath(); hx.arc(this.x,this.y,this.r,0,Math.PI*2); hx.fillStyle=this.color.replace('hsl','hsla').replace(')',`,${this.a})`); hx.fill(); }
}
const ps = Array.from({length:150},()=>new P());
function animP(){ hx.clearRect(0,0,hc.width,hc.height); ps.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(animP); }
resizeH(); animP();
window.addEventListener('resize',()=>{resizeS();resizeH();});

function spawnFloating(x, y, emojis){ for(let i=0;i<6;i++){ const el=document.createElement('div'); el.textContent=emojis[Math.floor(Math.random()*emojis.length)]; el.style.cssText=`position:fixed;font-size:${14+Math.random()*16}px;left:${x+(Math.random()-.5)*60}px;top:${y}px;pointer-events:none;z-index:9998;animation:floatUp ${.8+Math.random()*.8}s ease forwards;`; document.body.appendChild(el); setTimeout(()=>el.remove(),1500); } }

function heartClick(){ const h=document.getElementById('bigHeart'); h.style.transform='scale(1.4)'; setTimeout(()=>h.style.transform='',300); const r=h.getBoundingClientRect(); spawnFloating(r.left+r.width/2, r.top+r.height/2, ['💗','💕','💖','❤️','🌹']); }
document.addEventListener('click', e=>spawnFloating(e.clientX, e.clientY, ['💗','💕','✨','🌸','💫']));

function spawnPetal(){ const p=document.createElement('div'); p.className='petal'; p.textContent=['🌸','🌹','💮','🌺','🌷'][Math.floor(Math.random()*5)]; p.style.left=Math.random()*100+'vw'; p.style.animationDuration=(5+Math.random()*6)+'s'; document.body.appendChild(p); setTimeout(()=>p.remove(),12000); }
setInterval(spawnPetal, 600);

function showYes(){ document.getElementById('modal').classList.add('show'); for(let i=0;i<30;i++)setTimeout(spawnPetal,i*100); }
function closeModal(){ document.getElementById('modal').classList.remove('show'); }

let noMoves=0;
function moveNoBtn(){ const btn=document.getElementById('noBtn'); noMoves++; btn.style.position='relative'; btn.style.left=(Math.random()-.5)*300+'px'; btn.style.top=(Math.random()-.5)*200+'px'; if(noMoves>=3){ btn.textContent='好啦好啦 💕'; btn.onclick=showYes; btn.style.left='0'; btn.style.top='0'; } }
</script>
</body>
</html>
